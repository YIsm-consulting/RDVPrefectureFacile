<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — RDVPrefectureFacile.fr</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <meta name="theme-color" content="#1B4FD8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">RDV<span>Prefecture</span><span class="dot">Facile</span></a>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <h1>Nouveau mot de passe</h1>
      <p class="subtitle">Choisissez un nouveau mot de passe pour votre compte.</p>

      <div id="invalid-token" style="display:none;background:#FEE2E2;border-radius:8px;padding:16px;text-align:center;margin-bottom:20px;">
        <p style="color:#991B1B;font-weight:700;margin:0 0 4px;">Lien invalide ou expiré</p>
        <p style="color:#991B1B;font-size:0.85rem;margin:0;">Demandez un nouveau lien : <a href="mot-de-passe-oublie.html" style="color:#1B4FD8;">Mot de passe oublié</a></p>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="new-password">Nouveau mot de passe</label>
          <input class="form-input" type="password" id="new-password" placeholder="Minimum 8 caractères" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmer le mot de passe</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="Répétez le mot de passe" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary form-submit btn-lg">Enregistrer le nouveau mot de passe</button>
      </form>

      <div id="success-msg" style="display:none;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;padding:20px;text-align:center;margin-top:16px;">
        <p style="color:#065F46;font-weight:700;margin:0 0 8px;">Mot de passe mis à jour !</p>
        <a href="connexion.html" class="btn btn-primary btn-sm">Se connecter</a>
      </div>
    </div>
  </div>
</section>

<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-token').style.display = 'block';
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('[type="submit"]');
    const errEl = document.getElementById('reset-error');
    if (errEl) errEl.remove();

    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (newPassword !== confirmPassword) {
      const msg = document.createElement('p');
      msg.id = 'reset-error';
      msg.style.cssText = 'color:red;font-size:0.85rem;margin-top:12px;text-align:center;';
      msg.textContent = 'Les mots de passe ne correspondent pas.';
      e.target.appendChild(msg);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Enregistrement…';

    try {
      const res = await fetch('https://rdvprefecturefacile-backend-production.up.railway.app/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPassword })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Enregistrer le nouveau mot de passe';
      if (err.message === 'Lien invalide ou expiré.') {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-token').style.display = 'block';
      } else {
        const msg = document.createElement('p');
        msg.id = 'reset-error';
        msg.style.cssText = 'color:red;font-size:0.85rem;margin-top:12px;text-align:center;';
        msg.textContent = err.message;
        e.target.appendChild(msg);
      }
    }
  });
</script>
</body>
</html>
