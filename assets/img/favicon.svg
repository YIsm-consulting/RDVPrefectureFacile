<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond bleu arrondi -->
  <rect width="64" height="64" rx="14" fill="#1B4FD8"/>

  <!-- Corps du calendrier -->
  <rect x="12" y="20" width="40" height="32" rx="5" fill="white"/>

  <!-- En-tête du calendrier -->
  <rect x="12" y="20" width="40" height="13" rx="5" fill="#1340B0"/>
  <rect x="12" y="27" width="40" height="6" fill="#1340B0"/>

  <!-- Anneaux du calendrier -->
  <rect x="21" y="15" width="4" height="10" rx="2" fill="white"/>
  <rect x="39" y="15" width="4" height="10" rx="2" fill="white"/>

  <!-- Checkmark vert -->
  <circle cx="38" cy="40" r="11" fill="#0FA47A"/>
  <polyline points="32,40 36.5,44.5 44,36" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
