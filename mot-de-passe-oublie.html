<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — RDVPrefectureFacile.fr</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <meta name="theme-color" content="#1B4FD8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">RDV<span>Prefecture</span><span class="dot">Facile</span></a>
      <div class="navbar-actions">
        <a href="connexion.html" class="btn btn-ghost btn-sm">Se connecter</a>
      </div>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <h1>Mot de passe oublié</h1>
      <p class="subtitle">Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

      <div id="success-msg" style="display:none;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;padding:16px;text-align:center;margin-bottom:20px;">
        <p style="color:#065F46;font-weight:700;margin:0 0 4px;">Email envoyé !</p>
        <p style="color:#065F46;font-size:0.85rem;margin:0;">Vérifiez votre boîte mail et cliquez sur le lien (valable 1h).</p>
      </div>

      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="votre@email.fr" required>
        </div>
        <button type="submit" class="btn btn-primary form-submit btn-lg">Envoyer le lien de réinitialisation</button>
      </form>

      <p class="auth-switch">Vous vous souvenez de votre mot de passe ? <a href="connexion.html">Se connecter</a></p>
    </div>
  </div>
</section>

<script src="assets/js/api.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('[type="submit"]');
    const errEl = document.getElementById('forgot-error');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';
    if (errEl) errEl.remove();

    try {
      await fetch('https://rdvprefecturefacile-backend-production.up.railway.app/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() })
      });
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Envoyer le lien de réinitialisation';
      const msg = document.createElement('p');
      msg.id = 'forgot-error';
      msg.style.cssText = 'color:red;font-size:0.85rem;margin-top:12px;text-align:center;';
      msg.textContent = 'Une erreur est survenue. Réessayez.';
      e.target.appendChild(msg);
    }
  });
</script>
</body>
</html>
