<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer mon alerte — RDVPrefectureFacile.fr</title>
  <meta name="description" content="Créez votre alerte de rendez-vous en préfecture en 2 minutes. SMS + email + push dès qu'un créneau se libère.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">RDV<span>Prefecture</span><span class="dot">Facile</span></a>
      <div class="navbar-actions">
        <a href="connexion.html" class="btn btn-ghost btn-sm">Déjà inscrit ? Se connecter</a>
      </div>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="container">

    <!-- Progress bar -->
    <div style="max-width:480px;margin:0 auto 32px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:0.78rem;font-weight:600;color:var(--blue);">Étape 1/3 — Votre compte</span>
        <span style="font-size:0.78rem;color:var(--gray-500);">2 min</span>
      </div>
      <div style="height:4px;background:var(--gray-100);border-radius:99px;">
        <div style="height:100%;width:33%;background:var(--blue);border-radius:99px;"></div>
      </div>
    </div>

    <div class="auth-card">
      <h1>Créer mon compte</h1>
      <p class="subtitle">Aucune carte bancaire à cette étape. Votre alerte sera active en 2 minutes.</p>

      <!-- Social login -->
      <div class="social-login">
        <button class="social-btn">🔵 Continuer avec Google</button>
        <button class="social-btn">🔷 Continuer avec Facebook</button>
      </div>

      <div class="auth-divider"><span>ou avec votre email</span></div>

      <form id="inscription-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label" for="prenom">Prénom</label>
            <input class="form-input" type="text" id="prenom" placeholder="Prénom" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="nom">Nom</label>
            <input class="form-input" type="text" id="nom" placeholder="Nom" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email-inscription">Email</label>
          <input class="form-input" type="email" id="email-inscription" placeholder="votre@email.fr" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="tel">Téléphone mobile (pour les SMS)</label>
          <input class="form-input" type="tel" id="tel" placeholder="+33 6 XX XX XX XX" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input class="form-input" type="password" id="password" placeholder="Minimum 8 caractères" required minlength="8">
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label">Votre préfecture</label>
          <select class="form-select" id="field-prefecture">
            <option value="">Sélectionnez votre préfecture...</option>
            <option>Paris (75)</option>
            <option>Marseille — Bouches-du-Rhône (13)</option>
            <option>Lyon — Rhône (69)</option>
            <option>Toulouse — Haute-Garonne (31)</option>
            <option>Nice — Alpes-Maritimes (06)</option>
            <option>Nantes — Loire-Atlantique (44)</option>
            <option>Bordeaux — Gironde (33)</option>
            <option>Lille — Nord (59)</option>
            <option>Strasbourg — Bas-Rhin (67)</option>
            <option>Rennes — Ille-et-Vilaine (35)</option>
            <option>Autre (voir liste complète)</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:28px;">
          <label class="form-label">Votre démarche</label>
          <select class="form-select">
            <option value="">Sélectionnez votre démarche...</option>
            <option>Première demande de titre de séjour</option>
            <option>Renouvellement de titre de séjour</option>
            <option>Carte de résident 10 ans</option>
            <option>Naturalisation française</option>
            <option>Passeport / CNI</option>
            <option>Permis de conduire étranger</option>
            <option>Regroupement familial</option>
            <option>Admission exceptionnelle au séjour</option>
          </select>
        </div>

        <label style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;cursor:pointer;">
          <input type="checkbox" required style="margin-top:3px;accent-color:var(--blue);">
          <span style="font-size:0.82rem;color:var(--gray-700);">J'accepte les <a href="cgv.html" style="color:var(--blue);">CGV</a> et la <a href="politique-confidentialite.html" style="color:var(--blue);">politique de confidentialité</a></span>
        </label>

        <button type="submit" class="btn btn-primary form-submit btn-lg">Continuer → Choisir ma formule</button>
      </form>

      <p class="auth-switch">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>

      <!-- Réassurance -->
      <div style="margin-top:24px;padding:16px;background:var(--green-light);border-radius:var(--radius-sm);display:flex;gap:10px;align-items:center;">
        <span style="font-size:1.2rem;">🔒</span>
        <span style="font-size:0.78rem;color:var(--green);font-weight:500;">Vos données sont protégées — Hébergement France, conformité RGPD</span>
      </div>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
