<section class="auth-section">
  <div class="container">

    <!-- Progress bar -->
    <div style="max-width:480px;margin:0 auto 32px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:0.78rem;font-weight:600;color:var(--blue);">Étape 1/2 — Votre compte</span>

      </div>
      <div style="height:4px;background:var(--gray-100);border-radius:99px;">

    <div class="auth-card">
      <h1>Créer mon compte</h1>
      <p class="subtitle">Aucune carte bancaire à cette étape. Votre alerte sera active en 2 minutes.</p>

        <button class="social-btn">🔵 Continuer avec Google</button>
        <button class="social-btn">🔷 Continuer avec Facebook</button>

      <form id="inscription-form">

            <label class="form-label" for="prenom">Prénom</label>

          </div>

            <label class="form-label" for="nom">Nom</label>
            <input class="form-input" type="text" id="nom" placeholder="Nom" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email-inscription">Email</label>
          <input class="form-input" type="email" id="email-inscription" placeholder="votre@email.fr" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="tel">Téléphone mobile (pour les SMS)</label>
          <input class="form-input" type="tel" id="tel" placeholder="+33 6 XX XX XX XX" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input class="form-input" type="password" id="password" placeholder="Minimum 8 caractères" required minlength="8">
        </div>

<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.getElementById('inscription-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('[type="submit"]');
    const err = document.getElementById('inscription-error');
    btn.disabled = true;
    btn.textContent = 'Création du compte…';
    if (err) err.remove();

    try {
      await API.register({
        email:      document.getElementById('email-inscription').value.trim(),
        password:   document.getElementById('password').value,
        first_name: document.getElementById('prenom').value.trim(),
        last_name:  document.getElementById('nom').value.trim(),
        phone:      document.getElementById('tel').value.trim()
      });
      window.location.href = 'paiement.html';
    } catch (error) {
      btn.disabled = false;
      btn.textContent = 'Continuer → Choisir ma formule';
      const msg = document.createElement('p');
      msg.id = 'inscription-error';
      msg.style.cssText = 'color:red;font-size:0.85rem;margin-top:12px;text-align:center;';
      msg.textContent = error.message;
      e.target.appendChild(msg);
    }
  });
</script>
</body>
