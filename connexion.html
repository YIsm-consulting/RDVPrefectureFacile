<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se connecter — RDVPrefectureFacile.fr</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.svg">
  <meta name="theme-color" content="#1B4FD8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">RDV<span>Prefecture</span><span class="dot">Facile</span></a>
      <div class="navbar-actions">
        <a href="inscription.html" class="btn btn-primary btn-sm">Créer mon compte</a>
      </div>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <h1>Se connecter</h1>
      <p class="subtitle">Accédez à votre espace client pour gérer vos alertes.</p>

      <div class="social-login">
        <button class="social-btn">🔵 Google</button>
        <button class="social-btn">🔷 Facebook</button>
      </div>
      <div class="auth-divider"><span>ou avec votre email</span></div>

      <form>
        <div class="form-group">
          <label class="form-label" for="email-login">Email</label>
          <input class="form-input" type="email" id="email-login" placeholder="votre@email.fr" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password-login" style="display:flex;justify-content:space-between;">
            <span>Mot de passe</span>
            <a href="#" style="font-weight:500;color:var(--blue);font-size:0.85rem;">Mot de passe oublié ?</a>
          </label>
          <input class="form-input" type="password" id="password-login" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn btn-primary form-submit btn-lg">Se connecter →</button>
      </form>

      <p class="auth-switch">Pas encore de compte ? <a href="inscription.html">Créer mon alerte gratuitement</a></p>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
